name: CI

# Trigger on every push and every pull request to main
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Job 1: Build and run unit tests ─────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc cmake make

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: cd build && ctest --output-on-failure

      # Upload test results as a CI artifact so you can inspect failures
      - name: Upload test results
        if: always()   # run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/

  # ── Job 2: MISRA C static analysis ──────────────────────────
  static-analysis:
    name: MISRA C Analysis (cppcheck)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck (MISRA C:2012)
        working-directory: ${{ github.workspace }}   # ← explicit root
        run: |
          cppcheck \
            --enable=all \
            --disable=information \
            --addon=misra \
            --suppressions-list=cppcheck-suppressions.txt \
            --error-exitcode=1 \
            -I include/ \
            src/cbuf.c

  # ── Job 3: Confirm zero compiler warnings ───────────────────
  warnings-clean:
    name: Zero Compiler Warnings
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gcc cmake

      - name: Build with -Werror
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Wpedantic -Werror"
          cmake --build build --parallel